<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CryptoWrap</title>
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <meta name="description" content="Cryptocurrency Processing">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="logo">CryptoWrap</h1>
                <!-- <p class="header-subtitle">Cryptocurrency Gateway Dashboard</p> -->
                <!-- <p class="header-subtitle">Cryptocurrency Processing</p> -->
                <p class="header-subtitle">Account ID:<br>{{ user_uuid }} </p>
            </div>
            <div class="header-right">
                <button class="btn-logout" id="logout-btn">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="dashboard-content">
            <!-- Account Info Section with Usage Statistics -->
            <section class="section account-info">
                <h2>Account Overview</h2>
                <div class="info-grid">
                    <div class="info-card">
                        <p class="info-label">Member Since</p>
                        <p class="info-value">2025-06-15</p>
                    </div>
                    <div class="info-card">
                        <p class="info-label">Deposit Requests</p>
                        <p class="info-value">15</p>
                    </div>
                    <div class="info-card">
                        <p class="info-label">Successful Deposits</p>
                        <p class="info-value">14</p>
                    </div>
                </div>
            </section>

            <!-- Assets Section -->
            <section class="section assets">
                <div class="assets-header">
                    <h2>Assets</h2>
                    <button class="btn-refresh-balances" id="refresh-balances-btn" title="Refresh all balances">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"></path>
                        </svg>
                    </button>
                </div>
                <div class="assets-list" id="assets-list">
                    <!-- Assets will be dynamically rendered here -->
                </div>
            </section>

            <!-- API Endpoints Section -->
            <section class="section api-info">
                <h2>API Information</h2>
                <div class="api-details">
                    <div class="api-item">
                        <p class="api-label">Documentation</p>
                        <a href="/swagger-ui/" class="link-docs">View API Docs (Swagger UI)</a>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
